name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   ap-northeast-1
  ECR_REGISTRY: 931944281606.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  build:
    name: Build ARM64 images
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build Rust binaries inside an Ubuntu Docker container.
      # The node is aarch64 so Docker runs ARM64 containers natively — no QEMU.
      # Ubuntu has libuuid and libbsd that rusteron's precompiled Aeron library
      # requires; Amazon Linux 2023 does not.
      # Named Docker volumes provide a persistent cargo cache across workflow runs.
      - name: Clear stale build cache
        run: docker volume rm rust-target-cache 2>/dev/null || true

      - name: Build release binaries
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/build" \
            -v "cargo-registry:/usr/local/cargo/registry" \
            -v "rust-target-cache:/build/target" \
            -w /build \
            -e RUSTFLAGS="-C target-cpu=neoverse-n1" \
            rust:1-slim-bookworm \
            bash -c "
              echo '==> container arch:' \$(uname -m)
              apt-get update -qq
              apt-get install -y --no-install-recommends \
                pkg-config libssl-dev uuid-dev libbsd-dev \
                cmake g++ make
              cargo build --release \
                --bin connector \
                --bin aeron-driver \
                --bin clickhouse-bridge
            "
          # Restore ownership — files inside the container are owned by root.
          sudo chown -R "$(id -u):$(id -g)" target/

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push connector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-connector
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/connector:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/connector:latest
          build-args: BINARY_PATH=target/release/connector

      - name: Build and push aeron-driver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-aeron-driver
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:latest
          build-args: BINARY_PATH=target/release/aeron-driver

      - name: Build and push clickhouse-bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-bridge
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:latest
          build-args: BINARY_PATH=target/release/clickhouse-bridge

  deploy:
    name: Deploy to k3s
    needs: build
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply manifests and roll out
        env:
          SHA: ${{ github.sha }}
        run: |
          KUBECTL="sudo k3s kubectl"

          $KUBECTL apply -f deploy/k8s/namespace.yaml
          $KUBECTL apply -f deploy/k8s/clickhouse.yaml
          $KUBECTL apply -f deploy/k8s/connector-configmap.yaml
          $KUBECTL apply -f deploy/k8s/service.yaml
          $KUBECTL apply -f deploy/k8s/deployment.yaml

          $KUBECTL set image deployment/connector \
            aeron-driver="${{ env.ECR_REGISTRY }}/trading/aeron-driver:${SHA}" \
            connector="${{ env.ECR_REGISTRY }}/trading/connector:${SHA}" \
            clickhouse-bridge="${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:${SHA}" \
            -n trading

          $KUBECTL rollout status deployment/connector -n trading --timeout=180s
