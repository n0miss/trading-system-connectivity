name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token → AWS role assumption
  contents: read

env:
  AWS_REGION:   ap-northeast-1
  ECR_REGISTRY: 931944281606.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  # ── Build + push images ───────────────────────────────────────────────────
  # Runs on the tokyo-1 self-hosted runner (native ARM64 / Graviton2).
  # No cross-compilation needed; ECR auth uses the node's IAM instance role.
  build:
    name: Build ARM64 images
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        env:
          RUSTFLAGS: "-C target-cpu=neoverse-n1"
        run: |
          cargo build --release \
            --bin connector \
            --bin aeron-driver \
            --bin clickhouse-bridge

      - name: Log in to ECR (instance role — no static credentials)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker   # use the daemon already on the node

      - name: Build and push connector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-connector
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/connector:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/connector:latest
          build-args: |
            BINARY_PATH=target/release/connector

      - name: Build and push aeron-driver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-aeron-driver
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:latest
          build-args: |
            BINARY_PATH=target/release/aeron-driver

      - name: Build and push clickhouse-bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-bridge
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:latest
          build-args: |
            BINARY_PATH=target/release/clickhouse-bridge

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to k3s
    needs: build
    runs-on: [self-hosted, linux, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply manifests and roll out
        env:
          SHA: ${{ github.sha }}
        run: |
          KUBECTL="sudo k3s kubectl"

          $KUBECTL apply -f deploy/k8s/namespace.yaml
          $KUBECTL apply -f deploy/k8s/clickhouse.yaml
          $KUBECTL apply -f deploy/k8s/connector-configmap.yaml
          $KUBECTL apply -f deploy/k8s/service.yaml
          $KUBECTL apply -f deploy/k8s/deployment.yaml

          $KUBECTL set image deployment/connector \
            aeron-driver="${{ env.ECR_REGISTRY }}/trading/aeron-driver:${SHA}" \
            connector="${{ env.ECR_REGISTRY }}/trading/connector:${SHA}" \
            clickhouse-bridge="${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:${SHA}" \
            -n trading

          $KUBECTL rollout status deployment/connector -n trading --timeout=120s
