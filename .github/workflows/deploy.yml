name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   ap-northeast-1
  ECR_REGISTRY: 931944281606.dkr.ecr.ap-northeast-1.amazonaws.com

jobs:
  build:
    name: Build ARM64 images
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev uuid-dev libbsd-dev \
            g++ make libclang-dev ca-certificates curl
          # Aeron CMakeLists.txt requires CMake 3.30+; ubuntu-24.04 ships 3.28.
          curl -fsSL https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-aarch64.tar.gz \
            | sudo tar xz --strip-components=1 -C /usr/local

      - name: Build release binaries
        env:
          RUSTFLAGS: "-C target-cpu=neoverse-n1"
        run: |
          cargo build --release \
            --bin connector \
            --bin aeron-driver \
            --bin clickhouse-bridge

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::931944281606:role/github-actions-trading-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push connector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-connector
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/connector:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/connector:latest
          build-args: BINARY_PATH=target/release/connector

      - name: Build and push aeron-driver image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-aeron-driver
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/aeron-driver:latest
          build-args: BINARY_PATH=target/release/aeron-driver

      - name: Build and push clickhouse-bridge image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.runtime-bridge
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/trading/clickhouse-bridge:latest
          build-args: BINARY_PATH=target/release/clickhouse-bridge

  deploy:
    name: Deploy to k3s
    needs: build
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Copy k8s manifests to node
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 35.77.39.5
          username: ec2-user
          key: ${{ secrets.TOKYO1_SSH_KEY }}
          source: "deploy/k8s"
          target: "/home/ec2-user"

      - name: Apply manifests and roll out
        uses: appleboy/ssh-action@v1
        env:
          SHA: ${{ github.sha }}
        with:
          host: 35.77.39.5
          username: ec2-user
          key: ${{ secrets.TOKYO1_SSH_KEY }}
          envs: SHA
          script: |
            ECR="931944281606.dkr.ecr.ap-northeast-1.amazonaws.com"
            KUBECTL="sudo k3s kubectl"

            $KUBECTL apply -f /home/ec2-user/deploy/k8s/namespace.yaml
            $KUBECTL apply -f /home/ec2-user/deploy/k8s/clickhouse.yaml
            $KUBECTL apply -f /home/ec2-user/deploy/k8s/connector-configmap.yaml
            $KUBECTL apply -f /home/ec2-user/deploy/k8s/service.yaml
            $KUBECTL apply -f /home/ec2-user/deploy/k8s/deployment.yaml

            $KUBECTL set image deployment/connector \
              aeron-driver="$ECR/trading/aeron-driver:$SHA" \
              connector="$ECR/trading/connector:$SHA" \
              clickhouse-bridge="$ECR/trading/clickhouse-bridge:$SHA" \
              -n trading

            $KUBECTL rollout status deployment/connector -n trading --timeout=180s
